<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Tetris Match</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <section class="game-shell" aria-label="Tetris Match">
        <div class="play-area">
          <div class="playfield-wrap">
            <canvas id="game" width="320" height="640" aria-label="Игровое поле"></canvas>
            <div id="gesture-help" class="gesture-help" hidden aria-label="Схема мобильного управления">
              <div class="gesture-zone gesture-zone-left">
                <strong>Тап</strong>
                <span>влево</span>
                <em>↥ повернуть</em>
              </div>
              <div class="gesture-zone gesture-zone-right">
                <strong>Тап</strong>
                <span>вправо</span>
                <em>↥ повернуть</em>
              </div>
              <div class="gesture-drop">↧ вниз = сброс</div>
              <div class="gesture-bottom">низ = быстрее</div>
            </div>
            <div id="overlay" class="overlay" hidden>
              <h1 id="overlay-title">Пауза</h1>
              <p id="overlay-text">Нажми P, чтобы продолжить</p>
              <button id="restart-overlay" type="button">Новая игра</button>
            </div>
          </div>
        </div>

        <aside class="side-panel">
          <header>
            <p class="eyebrow">MVP</p>
            <h1>Tetris Match</h1>
          </header>

          <div class="stats" aria-label="Статистика">
            <div>
              <span>Высота</span>
              <strong id="height">0</strong>
            </div>
            <div>
              <span>Сгорело</span>
              <strong id="burned">0</strong>
            </div>
            <div>
              <span>Комбо</span>
              <strong id="combo">0</strong>
            </div>
            <div>
              <span>Обвал</span>
              <strong id="collapsed">0</strong>
            </div>
          </div>

          <section class="next-piece" aria-label="Следующая фигура">
            <h2>Следующая</h2>
            <canvas id="next" width="128" height="128"></canvas>
          </section>

          <div class="controls">
            <button id="help" class="help-button" type="button" aria-label="Показать мобильное управление" aria-pressed="false">?</button>
            <button id="pause" type="button">Пауза</button>
            <button id="restart" type="button">Рестарт</button>
          </div>

          <dl class="keys">
            <div><dt>← →</dt><dd>движение</dd></div>
            <div><dt>↓</dt><dd>быстрее</dd></div>
            <div><dt>↑ / X</dt><dd>поворот</dd></div>
            <div><dt>Z</dt><dd>назад</dd></div>
            <div><dt>Space</dt><dd>сброс</dd></div>
            <div><dt>P / R</dt><dd>пауза / рестарт</dd></div>
          </dl>
        </aside>
      </section>
    </main>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
